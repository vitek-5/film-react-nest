name: Docker Image CI

on:
  push:
    branches: ['main', 'review-3']
  pull_request:
    branches: ['main', 'review-3']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Set lower case owner name
        run: |
          echo "REPO=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Debug repo name
        run: |
          echo "repo: ${{ env.REPO }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: '{{defaultContext}}:backend'
          push: true
          tags: 'ghcr.io/${{ env.REPO }}/backend:latest'

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: '{{defaultContext}}:frontend'
          push: true
          tags: 'ghcr.io/${{ env.REPO }}/frontend:latest'

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: '{{defaultContext}}:nginx'
          push: true
          tags: 'ghcr.io/${{ env.REPO }}/server:latest'